<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Admin{% endblock %} — S-Tool Admin</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
<style>
  .notif-wrap{position:relative;display:flex;justify-content:flex-end;margin-bottom:8px;}
  .notif-bell-btn{
    background:#fff;border:1px solid var(--border);border-radius:10px;
    width:38px;height:38px;font-size:16px;cursor:pointer;position:relative;
  }
  .notif-badge{
    position:absolute;top:-4px;right:-4px;background:var(--danger);color:#fff;
    font-size:10px;font-weight:700;min-width:16px;height:16px;border-radius:8px;
    display:flex;align-items:center;justify-content:center;padding:0 3px;
  }
  .notif-panel{
    position:absolute;top:44px;right:0;width:320px;max-height:400px;overflow-y:auto;
    background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);
    display:none;z-index:50;
  }
  .notif-panel.open{display:block;}
  .notif-panel-head{
    display:flex;justify-content:space-between;align-items:center;
    padding:12px 14px;border-bottom:1px solid var(--border);font-weight:700;font-size:13px;
  }
  .notif-panel-head button{background:none;border:none;color:var(--blue-600);font-size:11.5px;cursor:pointer;font-weight:600;}
  .notif-item{display:flex;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border);}
  .notif-item.unread{background:var(--blue-100);}
  .notif-ic{font-size:16px;}
  .notif-msg{font-size:12.5px;font-weight:600;line-height:1.4;}
  .notif-time{font-size:11px;color:var(--text-500);margin-top:2px;}
  .notif-empty{padding:24px;text-align:center;color:var(--text-400);font-size:12.5px;}
</style>
</head>
<body>

<div class="app-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <span class="dot"></span>
      <span class="label">S-Tool Admin</span>
    </div>

    <nav class="sidebar-nav">
      <a class="nav-item{{ ' active' if active=='dashboard' else '' }}" href="{{ url_for('admin_dashboard') }}">
        🏠 <span class="label">Dashboard</span>
      </a>
      <a class="nav-item{{ ' active' if active=='employees' else '' }}" href="{{ url_for('admin_employees_page') }}">
        👥 <span class="label">Employees</span>
      </a>
      <a class="nav-item{{ ' active' if active=='tools' else '' }}" href="{{ url_for('admin_tools_page') }}">
        🧰 <span class="label">Tools</span>
      </a>
      <a class="nav-item{{ ' active' if active=='transactions' else '' }}" href="{{ url_for('admin_transactions_page') }}">
        🔁 <span class="label">Transactions</span>
      </a>
      <a class="nav-item{{ ' active' if active=='reports' else '' }}" href="{{ url_for('admin_reports_page') }}">
        📊 <span class="label">Reports</span>
      </a>
    </nav>

    <div class="sidebar-foot">
      <div class="sidebar-user">
        <div class="avatar">{{ (name[0] | upper) if name else 'A' }}</div>
        <div class="meta">
          {{ name }}<br>
          <small>Administrator</small>
        </div>
      </div>
      <a class="logout-link" href="{{ url_for('admin_logout') }}">⎋ <span class="label">Logout</span></a>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="content">
      <div class="notif-wrap">
        <button class="notif-bell-btn" id="notif-bell" data-role="admin">
          🔔<span class="notif-badge" id="notif-badge" style="display:none;">0</span>
        </button>
        <div class="notif-panel" id="notif-panel">
          <div class="notif-panel-head">
            <span>Notifications</span>
            <button id="notif-mark-all">Mark all read</button>
          </div>
          <div class="notif-list" id="notif-list"></div>
        </div>
      </div>
      {% block content %}{% endblock %}
    </div>
  </main>

</div>

<script src="{{ url_for('static', filename='js/admin.js') }}"></script>
<script src="{{ url_for('static', filename='js/notifications.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
