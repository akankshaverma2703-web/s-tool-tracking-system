{% extends "admin_base.html" %}
{% block title %}Tools{% endblock %}
{% block content %}

<div class="topbar-inline">
  <h1>Tools</h1>
  <p>Manage the tool inventory</p>
</div>

<div class="card card-pad" style="max-width:520px;margin-bottom:22px;">
  <h3 class="section-title">Add new tool</h3>

  <label class="field-label" for="tool-name-input">Tool Name</label>
  <input type="text" id="tool-name-input" placeholder="e.g. Hot Glue Gun">

  <label class="field-label" style="margin-top:14px;" for="tool-category-input">Category</label>
  <input type="text" id="tool-category-input" placeholder="e.g. Workshop">

  <label class="field-label" style="margin-top:14px;" for="tool-qty-input">Total Quantity</label>
  <input type="text" id="tool-qty-input" placeholder="e.g. 1">

  <label class="field-label" style="margin-top:14px;" for="tool-qrcode-input">QR Code <span style="opacity:.6;">(optional — auto-generated if left blank)</span></label>
  <input type="text" id="tool-qrcode-input" placeholder="e.g. HAMMER001">

  <button class="btn btn-primary" id="btn-add-tool" style="margin-top:16px;width:100%;justify-content:center;">Add Tool</button>
  <div id="tool-message" class="message" style="display:none;"></div>
</div>

<div class="card">
  <div class="table-wrap">
    <table class="data">
      <thead>
  <tr><th>Tool ID</th><th>Name</th><th>Category</th><th>Status</th><th>QR Code</th><th>Action</th></tr>
</thead>
      <tbody id="tools-body">
        <tr><td colspan="6" class="empty-row">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</div>

{% endblock %}
