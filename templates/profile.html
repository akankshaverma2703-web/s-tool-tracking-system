{% extends "base.html" %}
{% block title %}Profile{% endblock %}
{% block content %}

<div class="topbar-inline">
  <h1>Profile</h1>
  <p>Your account details</p>
</div>

<div class="card card-pad" style="max-width:440px;">
  <div class="profile-row">
    <div class="avatar-lg">{{ (name[0] | upper) if name else '?' }}</div>
    <div>
      <div style="font-weight:700;font-size:16px;">{{ name }}</div>
      <div style="color:var(--text-500);font-size:13px;">Employee</div>
    </div>
  </div>

  <div class="detail-grid">
    <div class="detail-item">
      <div class="k">Employee ID</div>
      <div class="v">{{ emp_id }}</div>
    </div>
    <div class="detail-item">
      <div class="k">company_name</div>
      <div class="v">{{ company_name or '—' }}</div>
    </div>
  </div>

  <a class="btn btn-primary" style="display:inline-flex;text-decoration:none;margin-top:20px;justify-content:center;width:100%;" href="{{ url_for('logout') }}">Logout</a>
</div>

{% endblock %}
