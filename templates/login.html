<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employee Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}" />
</head>
<body>
  <div class="card">
    <h1>🏢 Employee Login</h1>
    <p class="sub">Scan QR code on your ID card</p>

    <div id="reader" class="reader"></div>
    <p id="scanStatus" class="scan-status">Starting camera...</p>

    <div class="divider">— OR —</div>

    <div class="manual-entry">
      <p>Enter Employee ID manually</p>
      <div style="display:flex; gap:8px; margin-top:8px;">
        <input type="text" id="manualId" placeholder="e.g. EMP001" />
        <button id="manualBtn">Login</button>
      </div>
    </div>

    <div id="result" class="result hidden"></div>
  </div>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
